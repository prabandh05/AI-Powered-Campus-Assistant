<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus AI | Premium Assistant</title>
    <!-- Tailwind CSS for utility styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        },
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-[#0b0c10] text-gray-100 font-sans overflow-hidden h-screen flex">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 bg-[#1f2833] h-screen flex-shrink-0 flex flex-col border-r border-gray-800 transition-all duration-300 z-20">
        <div class="p-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-primary-600 p-1.5 rounded-lg">
                    <i data-lucide="bot" class="w-6 h-6 text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Campus AI</h1>
            </div>
            <button id="toggle-sidebar" class="p-1.5 hover:bg-gray-700 rounded-lg transition-colors lg:hidden">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <div class="mt-4 px-3 flex-grow overflow-y-auto space-y-2">
            <button id="new-chat" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl border border-gray-700 hover:bg-gray-700 transition-all group">
                <i data-lucide="plus" class="w-4 h-4 text-gray-400 group-hover:text-white"></i>
                <span class="text-sm font-medium">New Conversation</span>
            </button>

            <div class="py-4">
                <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-widest px-3 mb-2">Recent</h2>
                <div id="history-list" class="space-y-1">
                    <!-- History items will go here -->
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-gray-800 space-y-2">
            <button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-700 transition-colors text-sm text-gray-400 hover:text-white">
                <i data-lucide="settings" class="w-4 h-4"></i>
                Settings
            </button>
            <button class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-700 transition-colors text-sm text-gray-400 hover:text-white">
                <i data-lucide="help-circle" class="w-4 h-4"></i>
                Help & Support
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col h-screen relative bg-[#0b0c10]">
        <!-- Mobile Header -->
        <header class="lg:hidden flex items-center justify-between p-4 border-b border-gray-800">
            <button id="open-sidebar" class="p-1.5 hover:bg-gray-800 rounded-lg">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
            <h1 class="text-lg font-bold">Campus AI</h1>
            <div class="w-9"></div>
        </header>

        <!-- Chat Area -->
        <div id="chat-messages" class="flex-grow overflow-y-auto p-4 lg:p-8 space-y-6 scroll-smooth pb-32">
            <!-- Welcome View -->
            <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center max-w-2xl mx-auto space-y-8 animate-fade-in">
                <div class="relative">
                    <div class="absolute -inset-4 bg-primary-500/20 blur-2xl rounded-full"></div>
                    <i data-lucide="sparkles" class="w-16 h-16 text-primary-500 relative animate-pulse"></i>
                </div>
                <div class="space-y-2">
                    <h1 class="text-4xl font-bold tracking-tight bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
                        How can I help you today?
                    </h1>
                    <p class="text-gray-400 text-lg">
                        Ask me anything about the campus, placements, courses, or events.
                    </p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                    <button class="suggestion-card p-4 rounded-2xl border border-gray-800 bg-white/5 hover:bg-white/10 text-left transition-all hover:border-primary-500/50 group">
                        <p class="font-medium mb-1">Placement Records</p>
                        <p class="text-sm text-gray-500 group-hover:text-gray-400">What were the placement statistics for last year?</p>
                    </button>
                    <button class="suggestion-card p-4 rounded-2xl border border-gray-800 bg-white/5 hover:bg-white/10 text-left transition-all hover:border-primary-500/50 group">
                        <p class="font-medium mb-1">Course Details</p>
                        <p class="text-sm text-gray-500 group-hover:text-gray-400">Tell me about the Computer Science curriculum.</p>
                    </button>
                    <button class="suggestion-card p-4 rounded-2xl border border-gray-800 bg-white/5 hover:bg-white/10 text-left transition-all hover:border-primary-500/50 group">
                        <p class="font-medium mb-1">Campus Life</p>
                        <p class="text-sm text-gray-500 group-hover:text-gray-400">What clubs and activities are active on campus?</p>
                    </button>
                    <button class="suggestion-card p-4 rounded-2xl border border-gray-800 bg-white/5 hover:bg-white/10 text-left transition-all hover:border-primary-500/50 group">
                        <p class="font-medium mb-1">Admission Process</p>
                        <p class="text-sm text-gray-500 group-hover:text-gray-400">How do I apply for the next academic session?</p>
                    </button>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 right-0 p-4 lg:p-8 bg-gradient-to-t from-[#0b0c10] via-[#0b0c10]/95 to-transparent">
            <div class="max-w-4xl mx-auto relative group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-primary-600 to-indigo-600 rounded-2xl blur opacity-20 group-focus-within:opacity-40 transition duration-1000"></div>
                <div class="relative bg-[#1f2833] border border-gray-700 rounded-2xl p-2 flex flex-col transition-all focus-within:border-primary-500/50 shadow-2xl">
                    <textarea 
                        id="user-input"
                        rows="1"
                        placeholder="Message Campus AI..."
                        class="w-full bg-transparent border-none focus:ring-0 text-white placeholder-gray-500 resize-none px-4 py-3 max-h-60 overflow-y-auto leading-relaxed"
                    ></textarea>
                    <div class="flex items-center justify-between px-2 pb-2 pt-1 border-t border-gray-800 mt-2">
                        <div class="flex items-center gap-2">
                             <label class="flex items-center gap-2 cursor-pointer p-1.5 hover:bg-gray-800 rounded-lg transition-colors text-xs text-gray-400">
                                <input type="checkbox" id="show-context" class="w-3 h-3 rounded border-gray-700 bg-gray-800 text-primary-600 focus:ring-primary-500 focus:ring-offset-gray-900">
                                Show Context
                             </label>
                        </div>
                        <button 
                            id="send-button"
                            class="bg-white text-black p-2 rounded-xl hover:bg-gray-200 transition-all disabled:opacity-40 disabled:hover:bg-white"
                            disabled
                        >
                            <i data-lucide="arrow-up" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <p class="text-center text-[10px] text-gray-600 mt-3 uppercase tracking-tighter">
                    Campus AI may provide inaccurate info. Verify important facts.
                </p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
